# Opt-in instrumented (device) tests on an emulator. Manually triggered because
# emulator runs are slow; the unit tests in CI cover the pure logic on every push.
name: Instrumented tests

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: instrumented-${{ github.ref }}
  cancel-in-progress: true

jobs:
  androidTest:
    name: connectedDebugAndroidTest (API 34)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # KVM permissions so the emulator can use hardware acceleration.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: default          # AOSP system image — no Google Play Services
          script: ./gradlew connectedDebugAndroidTest --stacktrace
