# Fast feedback on every push and pull request: compile, run JVM unit tests,
# and lint. No signing, no device — this never needs secrets and runs on forks.
name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, unit-test, lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build, test, lint
        run: ./gradlew assembleDebug testDebugUnitTest lintDebug --stacktrace

      - name: Upload reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: |
            app/build/reports/tests/testDebugUnitTest
            app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
