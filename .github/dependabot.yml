# Keep Gradle dependencies and GitHub Actions current. Versions in this repo are
# a baseline; Dependabot proposes bumps and CI verifies they build.
version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
